name: Bug report
description: Report something that is broken or regressed
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem in one or two sentences.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Tell us exactly how to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: Browser, OS, backend mode, and any relevant version info.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste console output, backend logs, or attach screenshots if helpful.

